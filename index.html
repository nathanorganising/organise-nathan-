<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Organise Nathan</title>
<style>
body { font-family: Arial; margin: 0; padding: 20px; background: #04191F; color: white; }
.card { background: #0D2B32; padding: 20px; border-radius: 16px; }
.btn { padding: 10px 16px; border-radius: 10px; border: none; cursor: pointer; }
.btn-primary { background: #2BB7A9; color: white; }
.lock-screen { position: fixed; inset: 0; background: #04191F; display: flex; justify-content: center; align-items: center; }
.hidden { display: none; }
</style>
</head>
<body>

<div id="lock" class="lock-screen">
  <div class="card">
    <h2>🕺 Organise Nathan</h2>
    <input type="password" id="pass" placeholder="Password">
    <button class="btn btn-primary" onclick="unlock()">Unlock</button>
    <button class="btn" onclick="togglePass()">Show</button>
    <p id="error"></p>
  </div>
</div>

<div id="app" class="hidden">
  <h1>Content Calendar</h1>
  <select id="view" onchange="render()">
    <option value="week">Week</option>
    <option value="month">Month</option>
  </select>
  <div id="calendar"></div>
</div>

<script>
const PASSWORD = "Ho3042%na";

function unlock() {
  const val = document.getElementById("pass").value;
  if (val === PASSWORD) {
    document.getElementById("lock").classList.add("hidden");
    document.getElementById("app").classList.remove("hidden");
  } else {
    document.getElementById("error").innerText = "Wrong password";
  }
}

function togglePass() {
  const input = document.getElementById("pass");
  input.type = input.type === "password" ? "text" : "password";
}

function render() {
  const view = document.getElementById("view").value;
  const cal = document.getElementById("calendar");

  if (view === "week") {
    cal.innerHTML = "<p>Week view (Mon–Sun)</p>";
  } else {
    cal.innerHTML = "<p>Month view (calendar grid)</p>";
  }
}
</script>

</body>
</html>
